<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F2F1ED;--white:#FFFFFF;--primary:#E8520A;--primary-light:#FFF0EB;
  --success:#2D9E5F;--success-light:#E8F7EF;--danger:#D63B3B;--danger-light:#FDEAEA;
  --text:#1A1A1A;--muted:#666666;--border:#E8E7E2;
  --shadow:0 1px 4px rgba(0,0,0,.08);--shadow-md:0 4px 16px rgba(0,0,0,.12);
  --r:14px;--rs:10px;--body:'DM Sans',sans-serif;--display:'Fraunces',serif;
}
html,body{height:100%;background:#BBBBBB;font-family:var(--body);-webkit-font-smoothing:antialiased;overflow:hidden;}
#root{display:flex;justify-content:center;align-items:center;width:100vw;height:100vh;background:linear-gradient(135deg,#BBBBBB 0%,#999999 100%);}
.shell-wrap{width:402px;height:874px;transform-origin:center center;}
.shell{
  width:402px;
  height:874px;
  background:var(--bg);
  border-radius:44px;
  overflow:hidden;
  position:relative;
  box-shadow:0 40px 100px rgba(0,0,0,.4),0 0 0 1px rgba(0,0,0,.12);
  display:flex;
  flex-direction:column;
}
.status-bar{display:flex;justify-content:space-between;align-items:center;padding:16px 28px 0;font-size:13px;font-weight:600;color:var(--text);flex-shrink:0;}
.status-icons{display:flex;gap:5px;align-items:center;font-size:12px;}
.screen{flex:1;overflow-y:auto;padding:14px 20px 96px;scrollbar-width:none;}
.screen::-webkit-scrollbar{display:none;}
.bottom-nav{position:absolute;bottom:0;left:0;right:0;height:84px;background:var(--white);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;padding-bottom:16px;border-radius:0 0 44px 44px;z-index:10;}
/* FIX 1: nav-btn font-weight 700→500, icon 26px→22px */
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;font-weight:500;color:var(--muted);cursor:pointer;padding:8px 16px;border-radius:10px;transition:all .2s;border:none;background:none;font-family:var(--body);letter-spacing:.04em;text-transform:uppercase;}
.nav-btn.active{color:var(--primary);font-weight:700;}
.nav-btn svg{width:22px;height:22px;}
/* FIX 15: focus-visible styles for all interactive elements */
:focus-visible{outline:2px solid var(--primary);outline-offset:2px;border-radius:4px;}
.nav-btn:focus-visible{outline:2px solid var(--primary);outline-offset:2px;border-radius:10px;}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.top-right{display:flex;align-items:center;gap:8px;}
.logo{display:flex;align-items:center;gap:8px;}
.logo-icon{width:32px;height:32px;border-radius:10px;background:var(--primary-light);display:flex;align-items:center;justify-content:center;font-size:18px;}
.logo-text{font-size:15px;font-weight:700;color:var(--primary);letter-spacing:-.3px;}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--text);color:#fff;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;font-family:var(--body);flex-shrink:0;}
.lang-toggle{display:flex;gap:2px;background:var(--bg);border-radius:8px;padding:3px;border:1px solid var(--border);}
/* FIX 11: lang-btn color #666 for contrast */
.lang-btn{padding:4px 9px;border:none;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--body);transition:all .15s;background:none;color:var(--muted);}
.lang-btn.active{background:var(--white);color:var(--text);box-shadow:var(--shadow);}
.page-title{font-family:var(--display);font-size:28px;font-weight:900;line-height:1.1;color:var(--text);margin-bottom:10px;white-space:pre-line;}
.stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;}
.stat-card{border-radius:var(--rs);padding:13px 12px;box-shadow:var(--shadow);background:var(--white);border:2px solid transparent;}
.stat-card.neutral{border-color:var(--border);}
.stat-card.green{border-color:transparent;}
.stat-card.red{border-color:transparent;}
/* FIX 2: stat-lbl font-size 9px→11px */
.stat-lbl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;}
.stat-val{font-size:19px;font-weight:700;color:var(--text);}
.stat-val.g{color:var(--success);}
.stat-val.r{color:var(--danger);}
.card{background:var(--white);border-radius:var(--r);padding:13px;margin-bottom:8px;box-shadow:var(--shadow);}
.card h3{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px;}
/* FIX 11: card .sub color from #888 to #666 via --muted */
.card .sub{font-size:11px;color:var(--muted);margin-bottom:12px;}
.action-btn{background:var(--white);border-radius:var(--r);padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;box-shadow:var(--shadow);transition:all .18s;border:none;width:100%;text-align:left;font-family:var(--body);}
.action-btn:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);}
.a-icon{width:38px;height:38px;border-radius:10px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.a-text{flex:1;font-size:15px;font-weight:600;color:var(--text);}
.a-arrow{color:var(--muted);font-size:18px;}
.result-btn{background:var(--white);border-radius:var(--r);padding:16px 20px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow);cursor:pointer;transition:all .18s;border:none;width:100%;font-family:var(--body);}
.result-btn:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);}
.r-label{font-size:16px;font-weight:700;}
.r-label.g{color:var(--success);}
.r-label.r{color:var(--danger);}
.check-c{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;}
.check-c.g{background:var(--success-light);color:var(--success);}
.check-c.r{background:var(--danger-light);color:var(--danger);}
.toast{background:var(--white);border-radius:var(--rs);padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow);animation:slideIn .3s ease;}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.toast-close{background:none;border:none;font-size:18px;color:var(--muted);cursor:pointer;padding:4px 8px;line-height:1;}
.pred-banner{background:var(--white);border-radius:var(--rs);padding:11px 15px;margin-bottom:10px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow);}
/* FIX 5: pred-title 10px→12px */
.pred-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
.pred-text{font-size:13px;color:var(--text);margin-top:2px;}
.info-banner{background:var(--white);border-radius:var(--rs);padding:11px 15px;margin-bottom:10px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow);font-size:12px;color:#555;line-height:1.5;}
.sub-hdr{display:flex;align-items:center;gap:10px;margin-bottom:22px;}
/* FIX 8: back-btn has aria-label in JSX, keeping visual same */
.back-btn{background:none;border:none;font-size:24px;cursor:pointer;color:var(--text);padding:4px 8px;line-height:1;}
.tab-bar{background:var(--white);border-radius:var(--rs);padding:4px;display:flex;gap:2px;margin-bottom:14px;box-shadow:var(--shadow);}
.tab-btn{flex:1;padding:9px 4px;border:none;background:none;border-radius:8px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;font-family:var(--body);transition:all .18s;}
.tab-btn.active{background:var(--primary);color:#fff;}
.streak-num{font-family:var(--display);font-size:42px;font-weight:900;color:var(--text);line-height:1;}
.streak-badge{display:flex;align-items:center;gap:8px;padding:10px;background:var(--bg);border-radius:10px;margin:10px 0;font-size:13px;color:var(--text);}
.insight{font-size:13px;color:var(--text);line-height:1.55;margin-top:12px;}
.insight strong{color:var(--primary);}
.slot-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
.slot{background:var(--bg);border-radius:10px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;}
.slot-name{font-size:13px;font-weight:600;}
.slot-val{font-size:16px;font-weight:700;color:var(--primary);background:var(--primary-light);border-radius:8px;padding:2px 10px;}
.legend{display:flex;gap:14px;margin-top:8px;flex-wrap:wrap;}
/* FIX 3: leg-item 10px→11px, color via --muted */
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);font-weight:600;}
.leg-dot{width:8px;height:8px;border-radius:50%;}
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.filter-btn{padding:8px 14px;border-radius:20px;border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--body);transition:all .18s;background:var(--white);color:var(--muted);box-shadow:var(--shadow);}
.filter-btn.active{background:var(--text);color:#fff;}
/* FIX 4: fbadge 10px→11px */
.fbadge{background:var(--bg);border-radius:8px;padding:1px 6px;font-size:11px;margin-left:4px;color:var(--text);}
.filter-btn.active .fbadge{background:rgba(255,255,255,.2);color:#fff;}
.date-lbl{font-size:11px;font-weight:700;color:var(--muted);margin:14px 0 8px;letter-spacing:.04em;text-transform:uppercase;}
.log-item{background:var(--white);border-radius:var(--rs);padding:13px;margin-bottom:7px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow);}
.log-ico{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.log-ico.g{background:var(--success-light);color:var(--success);}
.log-ico.r{background:var(--danger-light);color:var(--danger);}
.log-title{font-size:13px;font-weight:700;color:var(--text);}
.log-sub{font-size:11px;color:var(--muted);}
.log-del{background:none;border:none;font-size:15px;cursor:pointer;color:var(--muted);margin-left:auto;padding:4px 6px;transition:color .15s;}
.log-del:hover{color:var(--danger);}
.prof-hero{background:var(--white);border-radius:var(--r);padding:18px;margin-bottom:12px;box-shadow:var(--shadow);}
.dog-row{display:flex;align-items:center;gap:14px;margin-bottom:16px;}
.dog-ava{width:62px;height:62px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:32px;}
.dog-name{font-family:var(--display);font-size:22px;font-weight:900;color:var(--text);}
.dog-breed{font-size:12px;color:var(--muted);}
/* FIX 5: dog-lvl 11px→12px */
.dog-lvl{font-size:12px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:.05em;margin-top:4px;}
.prof-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.ps-val{font-size:21px;font-weight:700;color:var(--text);text-align:center;}
/* FIX 3: ps-lbl 9.5px→11px */
.ps-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;font-weight:600;text-align:center;}
.goal-row{margin-bottom:12px;}
.goal-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:13px;font-weight:600;}
.pbar{height:7px;background:var(--bg);border-radius:4px;overflow:hidden;}
.pfill{height:100%;border-radius:4px;transition:width .4s ease;}
.pfill.g{background:var(--success);}
.pfill.o{background:var(--primary);}
.menu-item{background:var(--white);border-radius:var(--rs);padding:16px 18px;margin-bottom:8px;display:flex;align-items:center;gap:14px;cursor:pointer;box-shadow:var(--shadow);border:none;width:100%;font-family:var(--body);transition:all .18s;}
.menu-item:hover{transform:translateX(2px);}
.m-icon{font-size:18px;width:24px;text-align:center;}
.m-text{flex:1;font-size:14px;font-weight:600;color:var(--text);text-align:left;}
.m-arrow{color:var(--muted);font-size:16px;}
.notif-item{background:var(--bg);border-radius:var(--rs);padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.notif-label{font-size:13px;font-weight:600;color:var(--text);}
.notif-sub{font-size:11px;color:var(--muted);margin-top:2px;}
/* FIX 6: toggle gets aria attributes via JSX */
.toggle{width:44px;height:26px;border-radius:13px;border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;}
.toggle.on{background:var(--primary);}
.toggle.off{background:#AAA;}
.toggle::after{content:'';position:absolute;width:20px;height:20px;border-radius:50%;background:#fff;top:3px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.toggle.on::after{left:21px;}
.toggle.off::after{left:3px;}
.setting-row{background:var(--bg);border-radius:var(--rs);padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.setting-label{font-size:13px;font-weight:600;color:var(--text);}
.setting-val{font-size:13px;color:var(--muted);font-weight:500;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .3s ease both;}
.fu1{animation-delay:.05s}.fu2{animation-delay:.1s}.fu3{animation-delay:.15s}
/* visually hidden utility for screen reader only text */
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}
</style>

/* FIX 13: Charts get role="img" + aria-label */
function BarChart({data,color='#E8520A',ariaLabel}) {
  const max=Math.max(...data.map(d=>d.v),1);
  return <div role="img" aria-label={ariaLabel} style={{display:'flex',alignItems:'flex-end',gap:'3px',height:'72px',marginTop:'10px'}}>
    {data.map((d,i)=><div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:'3px'}}>
      <div style={{width:'100%',height:`${(d.v/max)*58}px`,background:color,borderRadius:'3px 3px 0 0',minHeight:d.v>0?'4px':'0'}}/>
      <span style={{fontSize:'9px',color:'#666',fontWeight:'600'}}>{d.l}</span>
    </div>)}
  </div>;
}

function StackedBar({data,ariaLabel}) {
  const max=Math.max(...data.map(d=>d.p+d.k+d.b),1);
  return <div role="img" aria-label={ariaLabel} style={{display:'flex',alignItems:'flex-end',gap:'4px',height:'80px',marginTop:'10px'}}>
    {data.map((d,i)=>{
      const total=d.p+d.k+d.b; const h=(total/max)*72;
      return <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:'3px'}}>
        <div style={{width:'100%',height:`${h}px`,borderRadius:'4px 4px 0 0',overflow:'hidden',display:'flex',flexDirection:'column-reverse'}}>
          <div style={{height:`${(d.p/total)*h}px`,background:'#F5C542'}}/>
          <div style={{height:`${(d.k/total)*h}px`,background:'#E8520A'}}/>
          <div style={{height:`${(d.b/total)*h}px`,background:'#D63B3B'}}/>
        </div>
        <span style={{fontSize:'9px',color:'#666',fontWeight:'600'}}>{d.l}</span>
      </div>;
    })}
  </div>;
}

function Donut({pee=60,poop=25,both=15,ariaLabel}) {
  const r=52,cx=64,cy=64,sw=18,c=2*Math.PI*r,g=3;
  const pd=(pee/100)*c,kd=(poop/100)*c,bd=(both/100)*c;
  return <svg width="128" height="128" viewBox="0 0 128 128" role="img" aria-label={ariaLabel}>
    <circle cx={cx} cy={cy} r={r} fill="none" stroke="#F2F1ED" strokeWidth={sw}/>
    <circle cx={cx} cy={cy} r={r} fill="none" stroke="#CCCCCC" strokeWidth={sw} strokeDasharray={`${pd-g} ${c-pd+g}`} strokeDashoffset={c*.25} strokeLinecap="round"/>
    <circle cx={cx} cy={cy} r={r} fill="none" stroke="#1A1A1A" strokeWidth={sw} strokeDasharray={`${kd-g} ${c-kd+g}`} strokeDashoffset={c*.25-pd} strokeLinecap="round"/>
    <circle cx={cx} cy={cy} r={r} fill="none" stroke="#E8520A" strokeWidth={sw} strokeDasharray={`${bd-g} ${c-bd+g}`} strokeDashoffset={c*.25-pd-kd} strokeLinecap="round"/>
  </svg>;
}

function HBar({label,sp,ap}) {
  return <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'12px'}}>
    <span style={{fontSize:'12px',fontWeight:'600',color:'#666',width:'38px',flexShrink:0}}>{label}</span>
    <div
      style={{flex:1,display:'flex',height:'14px',borderRadius:'7px',overflow:'hidden'}}
      role="progressbar"
      aria-valuenow={sp}
      aria-valuemin={0}
      aria-valuemax={100}
      aria-label={`${label}: ${sp}% başarı, ${ap}% kaza`}
    >
      <div style={{width:`${sp}%`,background:'var(--success)',transition:'width .4s'}}/>
      <div style={{width:`${ap}%`,background:'var(--danger)',transition:'width .4s'}}/>
    </div>
  </div>;
}

function getInsight(logs,t) {
  if(!logs.length) return t.insightNoData;
  const rate=logs.filter(l=>l.type==='success').length/logs.length;
  return rate>=0.7?t.insightGreat:rate>=0.4?t.insightOk:t.insightBad;
}

    )}
  </div>;

  if(subPage==='settings') return <div className="screen fu">
    <div className="sub-hdr">
      <button className="back-btn" onClick={()=>setSubPage(null)} aria-label={t.back}>←</button>
      <span style={{fontSize:'16px',fontWeight:'700'}}>{t.settings}</span>
    </div>
    {[[t.language,lang==='tr'?'Türkçe':'English'],[t.dogAge,lang==='tr'?'4 Ay':'4 Months'],[t.dataRetention,t.weeks12]].map(([label,val])=>
      <div key={label} className="setting-row"><span className="setting-label">{label}</span><span className="setting-val">{val} ›</span></div>
    )}
    <div className="setting-row">
      <span className="setting-label">{t.theme}</span>
      <div style={{display:'flex',gap:'6px'}} role="group" aria-label={t.theme}>
        {[[t.lightTheme,'light'],[t.darkTheme,'dark']].map(([label,val])=>
          <button key={val} onClick={()=>setTheme(val)} aria-pressed={theme===val} style={{padding:'4px 12px',borderRadius:'8px',border:'none',cursor:'pointer',fontWeight:'600',fontSize:'12px',fontFamily:'var(--body)',background:theme===val?'var(--primary)':'var(--bg)',color:theme===val?'#fff':'var(--muted)'}}>{label}</button>
        )}
      </div>
    </div>
  </div>;

  if(subPage==='location') return <div className="screen fu">
    <div className="sub-hdr">
      <button className="back-btn" onClick={()=>setSubPage(null)} aria-label={t.back}>←</button>
      <span style={{fontSize:'16px',fontWeight:'700'}}>{t.location}</span>
    </div>
    <div className="card">
      <p style={{fontSize:'13px',color:'#555',lineHeight:1.6}}>{lang==='tr'?'Konum izni, köpeğinizin dışarıda mı içeride mi olduğunu otomatik algılamak için kullanılır. Bu sayede dış mekan başarıları ayrı takip edilir.':'Location permission detects if your dog is inside or outside, so outdoor successes are tracked separately.'}</p>
      <button style={{marginTop:'14px',background:'var(--primary)',color:'#fff',border:'none',borderRadius:'10px',padding:'12px 20px',fontWeight:'700',fontSize:'14px',cursor:'pointer',fontFamily:'var(--body)',width:'100%'}}>{t.enableLocation}</button>
    </div>
  </div>;

  if(subPage==='export') return <div className="screen fu">
    <div className="sub-hdr">
      <button className="back-btn" onClick={()=>setSubPage(null)} aria-label={t.back}>←</button>
      <span style={{fontSize:'16px',fontWeight:'700'}}>{t.exportMenu}</span>
    </div>
    <div className="card">
      <p style={{fontSize:'13px',color:'#555',lineHeight:1.6,marginBottom:'14px'}}>{lang==='tr'?`Toplam ${total} kayıt PDF olarak dışa aktarılacak. Veterinerinizle paylaşabilirsiniz.`:`${total} records will be exported as PDF. You can share with your vet.`}</p>
      <button style={{background:'var(--primary)',color:'#fff',border:'none',borderRadius:'10px',padding:'12px 20px',fontWeight:'700',fontSize:'14px',cursor:'pointer',fontFamily:'var(--body)',width:'100%'}}>{t.exportBtn} ({total} {lang==='tr'?'kayıt':'records'})</button>
    </div>
  </div>;

  return <div className="screen">
    <TopBar lang={lang} setLang={setLang} onProfileClick={onProfileClick} t={t}/>
    <h1 className="page-title fu" style={{fontSize:'32px',marginBottom:'12px'}}>{t.profile}</h1>
    <div className="prof-hero fu">
      <div className="dog-row">
        <div className="dog-ava" aria-hidden="true">🐶</div>
        <div>
          <div className="dog-name">{t.dogName}</div>
          <div className="dog-breed">{t.breed} · {t.age}</div>
          <div className="dog-lvl"><span aria-hidden="true">🏅</span> {t.level}</div>
        </div>
      </div>
      <div className="prof-stats" role="list">
        <div role="listitem"><div className="ps-val">{total||142}</div><div className="ps-lbl">{t.total}</div></div>
        <div role="listitem"><div className="ps-val">12</div><div className="ps-lbl">{t.totalDays}</div></div>
        <div role="listitem"><div className="ps-val" style={{color:'#2D9E5F'}}>%{rate}</div><div className="ps-lbl">{t.successRate}</div></div>
      </div>
    </div>
    <div className="card fu fu1">
      <h3 style={{marginBottom:'14px'}}>{t.goals}</h3>
      {/* FIX 12: progress bars get role + aria */}
      <div className="goal-row">
        <div className="goal-top"><span>{t.dailyPee}</span><span style={{color:'#2D9E5F'}}>4/6</span></div>
        <div className="pbar" role="progressbar" aria-valuenow={66} aria-valuemin={0} aria-valuemax={100} aria-label={`${t.dailyPee}: %66 ${t.progressGoal}`}>
          <div className="pfill g" style={{width:'66%'}}/>
        </div>
      </div>
      <div className="goal-row">
        <div className="goal-top"><span>{t.streak}</span><span style={{color:'#E8520A'}}>2 {lang==='tr'?'Gün':'Days'}</span></div>
        <div className="pbar" role="progressbar" aria-valuenow={33} aria-valuemin={0} aria-valuemax={100} aria-label={`${t.streak}: %33 ${t.progressGoal}`}>
          <div className="pfill o" style={{width:'33%'}}/>
        </div>
      </div>
    </div>
    {[['🔔',t.notifs,'notifs'],['📍',t.location,'location'],['📤',t.exportMenu,'export'],['⚙️',t.settings,'settings']].map(([icon,label,page])=>
      <button key={page} className="menu-item fu fu2" onClick={()=>setSubPage(page)}>
        <span className="m-icon" aria-hidden="true">{icon}</span><span className="m-text">{label}</span><span className="m-arrow" aria-hidden="true">›</span>
      </button>
    )}
  </div>;
}

function App() {
  const [tab,setTab]=useState('home');
  const [lang,setLang]=useState('tr');
  const [logs,setLogs]=useState(INITIAL_LOGS);
  /* FIX 14: sync html[lang] attribute */
  useLangSync(lang);
  const addLog=(type,sub)=>setLogs(prev=>[{id:Date.now(),date:'25.12.2025',type,sub,time:new Date().toLocaleTimeString('tr',{hour:'2-digit',minute:'2-digit'})},...prev]);
  const navItems=[{k:'home',label:T[lang].home,Icon:HomeIcon},{k:'analysis',label:T[lang].statsNav,Icon:StatsIcon},{k:'history',label:T[lang].historyNav,Icon:LogIcon},{k:'profile',label:T[lang].profileNav,Icon:ProfIcon}];
  const goProfile=()=>setTab('profile');
  return <div className="shell-wrap" id="shell-wrap">
    <div className="shell">
    <div className="status-bar" aria-hidden="true"><span>9:41</span><div className="status-icons"><span>▌▌▌</span><span style={{fontSize:'11px'}}>WiFi</span><span>🔋</span></div></div>
    {tab==='home'&&<HomeScreen logs={logs} onAdd={addLog} lang={lang} setLang={setLang} onProfileClick={goProfile}/>}
    {tab==='analysis'&&<AnalysisScreen logs={logs} lang={lang} setLang={setLang} onProfileClick={goProfile}/>}
    {tab==='history'&&<HistoryScreen logs={logs} onDelete={id=>setLogs(p=>p.filter(l=>l.id!==id))} lang={lang} setLang={setLang} onProfileClick={goProfile}/>}
    {tab==='profile'&&<ProfileScreen logs={logs} lang={lang} setLang={setLang} onProfileClick={goProfile}/>}
    <nav className="bottom-nav" aria-label={lang==='tr'?'Ana menü':'Main menu'}>
      {navItems.map(({k,label,Icon})=>(
        <button
          key={k}
          className={`nav-btn ${tab===k?'active':''}`}
          onClick={()=>setTab(k)}
          aria-current={tab===k?'page':undefined}
        >
          <Icon a={tab===k}/>
          <span>{label}</span>
        </button>
      ))}
    </nav>
  </div></div>;
}

function scaleShell(){
  var wrap=document.getElementById('shell-wrap');
  if(!wrap)return;
  var scale=Math.min(window.innerWidth/402, window.innerHeight/874)*0.92;
  wrap.style.transform='scale('+scale+')';
}
window.addEventListener('resize',scaleShell);

const _root=ReactDOM.createRoot(document.getElementById('root'));
_root.render(<App/>);
// Run after React paints
requestAnimationFrame(()=>requestAnimationFrame(scaleShell));
</script>

</body>
</html>
