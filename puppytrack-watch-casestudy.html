<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PuppyTrack v2 — Watch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,900;1,9..144,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F4F0;
  --white:#FFFFFF;
  --ink:#1A1A18;
  --muted:#888880;
  --border:#E4E3DE;
  --primary:#E8520A;
  --primary-light:#FFF0EB;
  --success:#2D9E5F;
  --danger:#D63B3B;
  --body:'DM Sans',sans-serif;
  --display:'Fraunces',serif;
}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--ink);font-family:var(--body);-webkit-font-smoothing:antialiased;font-size:16px;line-height:1.6;}

/* ── Lang toggle ── */
.lang-bar{position:fixed;top:24px;right:32px;z-index:100;display:flex;gap:3px;background:rgba(255,255,255,.85);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:10px;padding:4px;}
.lang-opt{padding:5px 12px;border:none;border-radius:7px;font-family:var(--body);font-size:12px;font-weight:700;cursor:pointer;background:none;color:var(--muted);transition:all .15s;}
.lang-opt.active{background:var(--ink);color:#fff;}

/* ── Layout ── */
.container{max-width:900px;margin:0 auto;padding:0 32px;}
section{padding:96px 0 0;}
section:last-child{padding-bottom:120px;}
.divider{height:1px;background:var(--border);margin:64px 0 0;}

/* ── Typography ── */
.section-tag{font-size:11px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;}
.section-title{font-family:var(--display);font-size:clamp(28px,4vw,48px);font-weight:900;line-height:1.1;color:var(--ink);margin-bottom:16px;}
.section-title em{font-style:italic;color:var(--primary);}
.section-body{font-size:17px;color:#444;line-height:1.7;max-width:620px;}

/* ── Animations ── */
.animate{opacity:0;transform:translateY(20px);transition:opacity .6s ease,transform .6s ease;}
.animate.visible{opacity:1;transform:translateY(0);}

/* ── Hero ── */
.hero{min-height:auto;padding:120px 0;display:flex;align-items:center;position:relative;overflow:hidden;}
.hero-bg{position:absolute;inset:0;background:linear-gradient(160deg,#1A1A18 0%,#2C2C28 60%,#3A3530 100%);}
.hero-grain{position:absolute;inset:0;opacity:.04;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");}
.hero-content{position:relative;z-index:2;width:100%;max-width:900px;margin:0 auto;padding:0 32px;display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:center;}
.hero-tag{display:inline-flex;align-items:center;gap:8px;background:rgba(232,82,10,.15);border:1px solid rgba(232,82,10,.3);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:.08em;margin-bottom:24px;}
.hero-title{font-family:var(--display);font-size:clamp(42px,6vw,72px);font-weight:900;line-height:1.0;color:#fff;margin-bottom:8px;}
.hero-title em{font-style:italic;color:var(--primary);}
.hero-sub{font-size:18px;color:rgba(255,255,255,.5);margin-top:20px;line-height:1.6;font-weight:300;}
.hero-meta{display:flex;gap:24px;margin-top:36px;flex-wrap:wrap;}
.meta-item{display:flex;flex-direction:column;gap:3px;}
.meta-label{font-size:10px;font-weight:700;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.08em;}
.meta-value{font-size:14px;font-weight:600;color:rgba(255,255,255,.7);}

/* ── Watch hero component ── */
.hero-right{display:flex;justify-content:center;align-items:center;}
.watch-hero{
  position:relative;
  width:200px;height:200px;
  filter:drop-shadow(0 32px 64px rgba(0,0,0,.7));
}
.wh-bezel{
  position:absolute;inset:0;border-radius:50%;
  background:linear-gradient(145deg,#2A2A2E,#111113);
  box-shadow:0 0 0 3px #333,0 0 0 5px #222,inset 0 1px 0 rgba(255,255,255,.06);
}
.wh-crown{
  position:absolute;right:-10px;top:50%;transform:translateY(-50%);
  width:10px;height:34px;
  background:linear-gradient(180deg,#3A3A3E,#1E1E20);
  border-radius:3px;
}
.wh-screen{
  position:absolute;inset:8px;border-radius:50%;
  background:#111214;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
}
.wh-time{font-size:9px;font-weight:700;color:rgba(255,255,255,.3);letter-spacing:.06em;}
.wh-since{font-family:var(--display);font-size:22px;font-weight:900;color:#fff;line-height:1;}
.wh-since-label{font-size:8px;color:rgba(255,255,255,.3);font-weight:600;text-transform:uppercase;letter-spacing:.05em;}
.wh-stats{display:flex;gap:10px;align-items:center;}
.wh-stat{display:flex;align-items:center;gap:4px;}
.wh-dot{width:5px;height:5px;border-radius:50%;}
.wh-dot.g{background:var(--success);}
.wh-dot.r{background:var(--danger);}
.wh-num{font-size:14px;font-weight:700;color:#fff;}
.wh-btn{
  width:44px;height:44px;border-radius:50%;
  background:var(--primary);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(232,82,10,.5);
}

/* ── Why watch section ── */
.why-grid{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:start;margin-top:48px;}
.insight-card{background:var(--ink);color:#fff;border-radius:20px;padding:32px;display:flex;flex-direction:column;gap:20px;}
.insight-item{display:flex;gap:14px;align-items:flex-start;}
.insight-icon{width:36px;height:36px;border-radius:10px;background:rgba(232,82,10,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;}
.insight-text strong{color:#fff;display:block;margin-bottom:4px;font-size:13px;text-transform:uppercase;letter-spacing:.05em;}
.insight-text span{font-size:14px;line-height:1.6;color:rgba(255,255,255,.7);}
.quote-block{background:var(--bg);border-left:3px solid var(--primary);border-radius:0 12px 12px 0;padding:16px 20px;margin-top:20px;font-size:14px;font-style:italic;color:#555;line-height:1.6;}

/* ── Phone vs Watch comparison ── */
.comp-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:40px;}
.comp-card{background:var(--white);border-radius:20px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.06);}
.comp-header{padding:16px 24px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;}
.comp-header.phone{background:#F0F0EC;color:var(--muted);}
.comp-header.watch{background:var(--ink);color:var(--primary);}
.comp-body{padding:20px 24px;}
.comp-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);font-size:14px;color:#444;}
.comp-row:last-child{border-bottom:none;}
.comp-row .ci{width:20px;text-align:center;flex-shrink:0;font-size:16px;}
.comp-row .ct{flex:1;}
.comp-row .badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;margin-left:auto;flex-shrink:0;}
.badge.must{background:rgba(232,82,10,.12);color:var(--primary);}
.badge.phone-only{background:#F0F0EC;color:var(--muted);}

/* ── Scope decision ── */
.scope-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:40px;}
.scope-card{background:var(--white);border-radius:16px;padding:24px;box-shadow:0 1px 6px rgba(0,0,0,.06);}
.scope-card.yes{border-top:3px solid var(--success);}
.scope-card.no{border-top:3px solid #DDD;opacity:.6;}
.sc-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;}
.sc-label.yes{color:var(--success);}
.sc-label.no{color:var(--muted);}
.sc-title{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:6px;}
.sc-body{font-size:12px;color:var(--muted);line-height:1.6;}

/* ── Design decisions ── */
.dd-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:40px;}
.dd-card{background:var(--white);border-radius:16px;padding:28px;box-shadow:0 1px 6px rgba(0,0,0,.06);}
.dd-card.wide{grid-column:1/-1;}
.dd-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:16px;}
.dd-body{font-size:14px;color:#555;line-height:1.7;}

/* Screen flow */
.flow-grid{display:flex;gap:12px;margin-top:40px;overflow-x:auto;overflow-y:visible;padding-top:16px;padding-left:4px;padding-bottom:16px;scrollbar-width:none;align-items:flex-start;}
.flow-grid::-webkit-scrollbar{display:none;}
.flow-item{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:10px;}
.flow-watch{
  width:110px;height:110px;position:relative;
  flex-shrink:0;
}
.fw-bezel{position:absolute;inset:0;border-radius:50%;background:linear-gradient(145deg,#2A2A2E,#111113);box-shadow:0 0 0 2px #333,0 8px 20px rgba(0,0,0,.3);}
.fw-screen{position:absolute;inset:6px;border-radius:50%;background:#111214;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:8px;}
.fw-label{font-size:11px;font-weight:600;color:rgba(255,255,255,.4);text-align:center;width:80px;}
.flow-arrow{font-size:18px;color:var(--border);margin-top:40px;flex-shrink:0;}
.flow-name{font-size:11px;font-weight:700;color:var(--muted);text-align:center;max-width:90px;}

/* ── Prototype embed ── */
.proto-wrap{margin-top:40px;background:var(--ink);border-radius:24px;padding:48px;display:flex;flex-direction:column;align-items:center;gap:24px;}
.proto-label{font-family:var(--display);font-size:22px;font-weight:900;color:#fff;}
.proto-sub{font-size:15px;color:rgba(255,255,255,.4);text-align:center;max-width:400px;}
.proto-frame{width:100%;max-width:400px;height:620px;border:none;border-radius:20px;overflow:hidden;box-shadow:0 40px 80px rgba(0,0,0,.5);background:#0A0A0A;}

/* ── What I learned ── */
.learned-card{background:var(--white);border-radius:20px;padding:40px;box-shadow:0 1px 6px rgba(0,0,0,.06);margin-top:40px;display:grid;grid-template-columns:1fr 2fr;gap:40px;align-items:start;}
.lc-num{font-family:var(--display);font-size:72px;font-weight:900;color:var(--primary);line-height:1;}
.lc-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-top:4px;}
.lc-body{font-size:16px;color:#444;line-height:1.75;}

/* ── Next steps ── */
.next-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:40px;}
.next-card{background:var(--white);border-radius:16px;padding:24px;box-shadow:0 1px 6px rgba(0,0,0,.06);border-top:3px solid var(--border);}
.next-card.done{border-top-color:var(--success);}
.next-card.active{border-top-color:var(--primary);}
.nc-phase{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:10px;}
.nc-title{font-size:16px;font-weight:700;color:var(--ink);margin-bottom:8px;}
.nc-items{font-size:13px;color:#666;line-height:1.8;}
.nc-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:8px;}
.nc-badge.done{background:rgba(45,158,95,.1);color:var(--success);}
.nc-badge.active{background:rgba(232,82,10,.1);color:var(--primary);}
.nc-badge.soon{background:#F0F0EC;color:var(--muted);}

/* ── Closing banner ── */
.closing{margin-top:80px;}
.closing-inner{
  background:linear-gradient(160deg,#1A1A18 0%,#2C2C28 60%,#3A3530 100%);
  border-radius:32px;padding:72px 64px;
  display:flex;align-items:center;justify-content:space-between;
  gap:48px;flex-wrap:wrap;position:relative;overflow:hidden;
}
.closing-grain{position:absolute;inset:0;opacity:.04;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");pointer-events:none;}
.closing-left{position:relative;z-index:1;flex:1;min-width:260px;}
.closing-eyebrow{font-size:11px;font-weight:700;color:rgba(232,82,10,.8);text-transform:uppercase;letter-spacing:.1em;margin-bottom:16px;}
.closing-title{font-family:var(--display);font-size:clamp(32px,4vw,52px);font-weight:900;color:#fff;line-height:1.05;margin-bottom:20px;}
.closing-body{font-size:16px;color:rgba(255,255,255,.4);line-height:1.7;max-width:400px;}
.closing-right{position:relative;z-index:1;flex-shrink:0;}
.closing-watch{
  width:140px;height:140px;position:relative;
  filter:drop-shadow(0 16px 32px rgba(0,0,0,.6));
}
.cw-bezel{position:absolute;inset:0;border-radius:50%;background:linear-gradient(145deg,#2A2A2E,#111113);box-shadow:0 0 0 2px #333,0 0 0 4px #222;}
.cw-screen{position:absolute;inset:7px;border-radius:50%;background:#111214;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;}
.cw-logo{font-size:9px;font-weight:700;color:var(--primary);}
.cw-time{font-family:var(--display);font-size:20px;font-weight:900;color:#fff;line-height:1;}
.cw-stats{display:flex;gap:8px;}
.cw-stat{display:flex;align-items:center;gap:3px;}
.cw-dot{width:5px;height:5px;border-radius:50%;}
.cw-dot.g{background:var(--success);}
.cw-dot.r{background:var(--danger);}
.cw-num{font-size:12px;font-weight:700;color:#fff;}

@media(max-width:700px){
  /* Padding */
  .container{padding:0 16px;}
  .hero-content{padding:0 16px;}
  section{padding:64px 0 0;}

  /* Hero */
  .hero{padding:80px 0;}
  .hero-title{font-size:clamp(32px,8vw,48px);}
  .hero-sub{font-size:15px;}
  .hero-meta{gap:16px;}
  .meta-value{font-size:13px;}

  /* Grids → tek sütun */
  .hero-content,.why-grid,.comp-grid,.dd-grid,.learned-card{grid-template-columns:1fr;}
  .hero-right{display:none;}
  .scope-grid{grid-template-columns:1fr 1fr;}
  .next-grid{grid-template-columns:1fr;}

  /* Typography */
  .section-title{font-size:clamp(22px,6vw,32px);}
  .section-body{font-size:15px;}

  /* Insight card */
  .insight-card{padding:24px 20px;}
  .insight-text span{font-size:13px;}

  /* Comp tablosu */
  .comp-card{border-radius:14px;}
  .comp-row{padding:10px 14px;}
  .comp-row .ct{font-size:13px;}

  /* Scope grid — 1 sütun mobilde */
  .scope-grid{grid-template-columns:1fr;}
  .scope-card{padding:18px;}

  /* Tasarım kararları */
  .dd-card{padding:20px;}
  .dd-body{font-size:13px;}

  /* Ekran akışı */
  .flow-grid{padding-left:2px;}
  .dd-card.wide{overflow-x:auto;padding:20px 16px;}

  /* Öğrendiklerim */
  .learned-card{padding:28px 20px;gap:20px;}
  .lc-num{font-size:52px;}
  .lc-body{font-size:14px;}

  /* Sonraki adımlar */
  .next-card{padding:18px;}
  .nc-title{font-size:14px;}

  /* Kapanış banner */
  .closing-inner{padding:40px 24px;flex-direction:column;}
  .closing-title{font-size:clamp(26px,6vw,38px);}
  .closing-body{font-size:14px;}
  .closing-right{display:none;}
}
</style>
</head>
<body>

<div class="lang-bar">
  <button class="lang-opt active" onclick="setLang('tr')">TR</button>
  <button class="lang-opt" onclick="setLang('en')">EN</button>
</div>

<!-- ══ HERO ══ -->
<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-grain"></div>
  <div class="hero-content">
    <div>
      <div class="hero-tag">🐾 <span data-tr="PuppyTrack · v2" data-en="PuppyTrack · v2">PuppyTrack · v2</span></div>
      <h1 class="hero-title" data-tr="Bileğinde<br><em>iki dokunuş</em>" data-en="Two taps<br><em>on your wrist</em>"></h1>
      <p class="hero-sub" data-tr="v1 telefonda çalıştı. Ama kullanıcı köpeğiyle uğraşırken telefona uzanmak zorunda kalıyordu. v2, kaydı bileğe taşıdı." data-en="v1 worked on the phone. But users had to reach for their phone while managing their dog. v2 moved logging to the wrist."></p>
      <div class="hero-meta">
        <div class="meta-item">
          <span class="meta-label" data-tr="Platform" data-en="Platform"></span>
          <span class="meta-value">Wear OS 4</span>
        </div>
        <div class="meta-item">
          <span class="meta-label" data-tr="Cihaz" data-en="Device"></span>
          <span class="meta-value">Samsung Galaxy Watch 7</span>
        </div>
        <div class="meta-item">
          <span class="meta-label" data-tr="Versiyon" data-en="Version"></span>
          <span class="meta-value" style="color:var(--primary);">v2</span>
        </div>
      </div>
    </div>
    <div class="hero-right">
      <div class="watch-hero">
        <div class="wh-bezel"></div>
        <div class="wh-crown"></div>
        <div class="wh-screen">
          <div class="wh-time">09:41</div>
          <div class="wh-since">47 dk</div>
          <div class="wh-since-label" data-tr="son kayıttan" data-en="since last log"></div>
          <div class="wh-stats">
            <div class="wh-stat"><div class="wh-dot g"></div><div class="wh-num">3</div></div>
            <div style="width:1px;height:14px;background:rgba(255,255,255,.1);"></div>
            <div class="wh-stat"><div class="wh-dot r"></div><div class="wh-num">2</div></div>
          </div>
          <div class="wh-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- ══ NEDEN SAAT ══ -->
<div class="divider"></div>
<section>
  <div class="container animate">
    <p class="section-tag" data-tr="v1'den v2'ye" data-en="From v1 to v2"></p>
    <h2 class="section-title" data-tr="Telefon yeterliydi.<br><em>Ama yeterli değildi.</em>" data-en="The phone worked.<br><em>Just not well enough.</em>"></h2>
    <div class="why-grid">
      <div>
        <p class="section-body" data-tr="v1 kullanıcıları kaydı yapmak için önce köpeği kontrol edecek, sonra cebi ya da çantayı arayacak, uygulamayı açacak ve kayıt yapacaktı. Kaza anı geçici ve gergin bir andır. Bu kadar adım o anda çok fazla." data-en="v1 users had to check on their dog, find their phone in a pocket or bag, open the app, then log. The moment of an accident is fleeting and stressful. That many steps is too many."></p>
        <div class="quote-block" data-tr='"Kaza olduğunda ellerim hep doluydu. Telefona uzanana kadar ne olduğunu unutuyordum."' data-en='"My hands were always full during accidents. By the time I reached my phone I forgot what happened."'></div>
      </div>
      <div class="insight-card">
        <div class="insight-item">
          <div class="insight-icon">📱</div>
          <div class="insight-text">
            <strong data-tr="Telefon çok adım" data-en="Phone = too many steps"></strong>
            <span data-tr="Cep → kilit aç → uygulama bul → aç → kayıt. 5 adım, kaza anında 5 adım fazla." data-en="Pocket → unlock → find app → open → log. 5 steps. 5 steps too many at the moment of an accident."></span>
          </div>
        </div>
        <div class="insight-item">
          <div class="insight-icon">⌚</div>
          <div class="insight-text">
            <strong data-tr="Saat daima bilek üstünde" data-en="Watch is always on the wrist"></strong>
            <span data-tr="Çıkarma yok, kilitleme yok. Tek dokunuş kayıt." data-en="No reaching, no unlocking. One tap to log."></span>
          </div>
        </div>
        <div class="insight-item">
          <div class="insight-icon">🔗</div>
          <div class="insight-text">
            <strong data-tr="Telefon hâlâ merkez" data-en="Phone stays the hub"></strong>
            <span data-tr="Analiz, geçmiş ve istatistikler telefonda kalır. Saat sadece en kritik iki eylemi üstlenir: kayıt gir, kayıt sil." data-en="Analysis, history and stats stay on the phone. The watch handles only the two most critical actions: log and undo."></span>
          </div>
        </div>
      </div>

<script>
function setLang(lang) {
  document.querySelectorAll('[data-tr]').forEach(el => {
    const val = el.getAttribute('data-' + lang);
    if (val) el.innerHTML = val;
  });
  document.querySelectorAll('.lang-opt').forEach(btn => {
    btn.classList.toggle('active', btn.textContent === lang.toUpperCase());
  });
  document.documentElement.lang = lang;
}

const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }
  });
}, { threshold: 0.1 });
document.querySelectorAll('.animate').forEach(el => observer.observe(el));

setLang('tr');
</script>
<script>
function reportHeight(){
  const h = document.documentElement.scrollHeight;
  window.parent.postMessage({type:'setHeight',height:h},'*');
}
window.addEventListener('load', reportHeight);
window.addEventListener('resize', reportHeight);
new MutationObserver(reportHeight).observe(document.body,{childList:true,subtree:true,attributes:true});
</script>
